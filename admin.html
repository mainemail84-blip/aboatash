<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پنل مدیریت - Lumina Café</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-2xl mx-auto p-6">

    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold">پنل مدیریت</h1>
      <a href="index.html" class="text-amber-400 hover:underline">← صفحه مشتری</a>
    </div>

    <!-- Token -->
    <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
      <label class="block text-sm mb-2">GitHub Token</label>
      <input type="password" id="githubToken" placeholder="ghp_..." class="w-full bg-zinc-800 p-4 rounded-2xl">
    </div>

    <!-- فرم -->
    <div class="bg-zinc-900 rounded-3xl p-6">
      <h2 class="text-xl mb-6 font-semibold">افزودن / ویرایش آیتم</h2>
      <form id="itemForm">
        <input type="hidden" id="editId">

        <input id="name" placeholder="نام آیتم" class="w-full bg-zinc-800 p-4 rounded-2xl mb-4" required>

        <div class="grid grid-cols-2 gap-4 mb-4">
          <input id="price" placeholder="قیمت (هزار تومان)" class="bg-zinc-800 p-4 rounded-2xl" required>
          <input id="category" placeholder="دسته‌بندی" class="bg-zinc-800 p-4 rounded-2xl" required>
        </div>

        <input id="desc" placeholder="توضیح کوتاه" class="w-full bg-zinc-800 p-4 rounded-2xl mb-4">

        <!-- انتخاب عکس از گالری -->
        <div class="mb-6">
          <label class="block text-sm mb-3">عکس آیتم</label>
          <input type="file" id="imageFile" accept="image/*" class="block w-full text-sm text-zinc-300 
                 file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:border-0 file:bg-amber-600 file:text-white hover:file:bg-amber-700 cursor-pointer">
          
          <!-- پیش‌نمایش -->
          <div id="previewContainer" class="mt-4 hidden">
            <p class="text-sm text-zinc-400 mb-2">پیش‌نمایش:</p>
            <img id="previewImage" class="max-h-52 rounded-3xl border border-zinc-700">
          </div>
        </div>

        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 py-4 rounded-3xl font-medium text-lg">
          ذخیره و آپلود به GitHub
        </button>
      </form>
    </div>

    <div id="status" class="text-center my-6"></div>

    <!-- لیست آیتم‌ها -->
    <h2 class="text-xl font-semibold mb-4">آیتم‌های فعلی</h2>
    <div id="adminList" class="space-y-4"></div>
  </div>

  <script>
    const OWNER = "mainemail84-blip";   // ← اینجا نام کاربری گیت‌هابت
    const REPO = "aboatash"; // ← نام ریپازیتوری

    let menuItems = [];
    let selectedBase64 = null;

    // پیش‌نمایش عکس
    document.getElementById('imageFile').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        selectedBase64 = event.target.result;
        document.getElementById('previewImage').src = selectedBase64;
        document.getElementById('previewContainer').classList.remove('hidden');
      };
      reader.readAsDataURL(file);
    });

    async function loadData() {
      try {
        const res = await fetch(`menu-data.json?t=${Date.now()}`);
        menuItems = await res.json();
      } catch(e) {}
      renderList();
    }

    function renderList() {
      const container = document.getElementById('adminList');
      container.innerHTML = menuItems.map(item => `
        <div class="bg-zinc-900 rounded-3xl p-5 flex gap-4">
          <div class="w-24 h-24 rounded-2xl overflow-hidden bg-zinc-800 flex-shrink-0">
            ${item.image ? 
              `<img src="${item.image}" class="w-full h-full object-cover">` : 
              `<div class="w-full h-full flex items-center justify-center text-6xl">${item.emoji}</div>`
            }
          </div>
          <div class="flex-1">
            <div class="font-bold">${item.name}</div>
            <div class="text-sm text-zinc-400">${item.desc || ''}</div>
            <div class="text-amber-400">${item.price} هزار تومان</div>
          </div>
          <div class="flex flex-col gap-2 text-sm">
            <button onclick="editItem(${item.id})" class="text-blue-400">ویرایش</button>
            <button onclick="deleteItem(${item.id})" class="text-red-400">حذف</button>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('itemForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = document.getElementById('githubToken').value.trim();
      if (!token) return alert("توکن GitHub را وارد کنید!");

      const newItem = {
        id: document.getElementById('editId').value ? Number(document.getElementById('editId').value) : Date.now(),
        name: document.getElementById('name').value,
        price: document.getElementById('price').value,
        category: document.getElementById('category').value,
        desc: document.getElementById('desc').value,
        image: selectedBase64,
        emoji: "☕"
      };

      if (document.getElementById('editId').value) {
        menuItems = menuItems.map(item => item.id == newItem.id ? newItem : item);
      } else {
        menuItems.push(newItem);
      }

      const status = document.getElementById('status');
      status.innerHTML = "در حال آپلود به GitHub...";

      if (await updateGitHub(token)) {
        status.innerHTML = `<span class="text-green-400">✅ با موفقیت ذخیره شد</span>`;
        renderList();
        e.target.reset();
        selectedBase64 = null;
        document.getElementById('previewContainer').classList.add('hidden');
      }
    });

    async function updateGitHub(token) {
      try {
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(menuItems, null, 2))));
        let sha = null;
        try {
          const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/menu-data.json`, {
            headers: { Authorization: `token ${token}` }
          });
          if (r.ok) sha = (await r.json()).sha;
        } catch(e) {}
        
        await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/menu-data.json`, {
          method: 'PUT',
          headers: { Authorization: `token ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify({ message: "Update menu", content, sha })
        });
        return true;
      } catch (err) {
        console.error(err);
        alert("خطا در آپلود");
        return false;
      }
    }

    function editItem(id) {
      const item = menuItems.find(i => i.id === id);
      if (item) {
        document.getElementById('editId').value = item.id;
        document.getElementById('name').value = item.name;
        document.getElementById('price').value = item.price;
        document.getElementById('category').value = item.category;
        document.getElementById('desc').value = item.desc || '';
      }
    }

    function deleteItem(id) {
      if (confirm("آیتم حذف شود؟")) {
        menuItems = menuItems.filter(i => i.id !== id);
        renderList();
      }
    }

    loadData();
  </script>
</body>
</html>
