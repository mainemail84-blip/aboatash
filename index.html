<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آب و آتش • منو</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#140f0c;
    --bg-elev:#1c1611;
    --bg-card:#241b15;
    --bg-card-2:#2b2018;
    --accent:#d9a441;
    --accent-2:#f0c674;
    --accent-dark:#a97a2c;
    --text:#f5efe4;
    --text-dim:#a8988667;
    --dim:#9c8c7a;
    --border:#33271b;
    --danger:#e0654f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Vazirmatn', system-ui, sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  .app{
    max-width:430px;
    margin:0 auto;
    min-height:100vh;
    background:var(--bg);
    position:relative;
    padding-bottom:92px;
    overflow-x:hidden;
  }
  ::-webkit-scrollbar{display:none;}
  * {scrollbar-width:none;}

  /* Header */
  .topbar{
    position:sticky; top:0; z-index:30;
    background:linear-gradient(180deg, rgba(20,15,12,.97), rgba(20,15,12,.9));
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border);
  }
  .topbar-row{display:flex; align-items:center; justify-content:space-between; padding:16px 18px 10px;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-icon{
    width:38px;height:38px;border-radius:12px;
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    display:flex;align-items:center;justify-content:center;
    color:#1a1209; font-size:18px; box-shadow:0 4px 14px rgba(217,164,65,.35);
  }
  .brand-title{font-weight:800; font-size:19px; letter-spacing:.2px;}
  .icon-btn{
    width:38px;height:38px;border-radius:11px;background:var(--bg-card);
    border:1px solid var(--border); display:flex;align-items:center;justify-content:center;
    color:var(--text); cursor:pointer;
  }
  .search-wrap{padding:2px 18px 14px;}
  .search-box{
    position:relative;
  }
  .search-box input{
    width:100%; background:var(--bg-card); border:1px solid var(--border); color:var(--text);
    border-radius:16px; padding:13px 44px 13px 16px; font-family:inherit; font-size:14px; outline:none;
  }
  .search-box input:focus{border-color:var(--accent);}
  .search-box i{position:absolute; right:16px; top:50%; transform:translateY(-50%); color:var(--dim);}

  .tabs-row{display:flex; gap:6px; padding:0 18px 14px;}
  .tab-pill{
    flex:1; text-align:center; padding:9px 0; border-radius:14px; font-size:13px; font-weight:600;
    background:transparent; color:var(--dim); cursor:pointer; border:1px solid transparent;
  }
  .tab-pill.active{background:var(--accent); color:#1a1209;}

  .view{display:none; padding:0 18px 6px;}
  .view.active{display:block;}

  /* HERO */
  .hero{
    margin-top:14px; border-radius:22px; padding:26px 20px; position:relative; overflow:hidden;
    background:radial-gradient(120% 140% at 100% 0%, #3a2712 0%, #1c130a 55%, #140f0c 100%);
    border:1px solid var(--border);
  }
  .hero i.steam{position:absolute; font-size:120px; color:rgba(217,164,65,.08); left:-20px; bottom:-30px;}
  .hero h2{font-size:22px; margin:0 0 6px; font-weight:800;}
  .hero p{margin:0 0 18px; color:var(--dim); font-size:13.5px; line-height:1.8;}
  .hero-btn{
    display:inline-flex; align-items:center; gap:8px; background:var(--accent); color:#1a1209;
    padding:11px 22px; border-radius:14px; font-weight:700; font-size:13.5px; border:none; cursor:pointer;
  }

  .section-title{display:flex; align-items:center; justify-content:space-between; margin:26px 0 14px;}
  .section-title h3{font-size:16px; margin:0; display:flex; align-items:center; gap:8px;}
  .section-title .see-all{font-size:12px; color:var(--accent); cursor:pointer;}

  /* Special offer card */
  .offer-card{
    display:flex; gap:14px; background:var(--bg-card); border:1px solid var(--border); border-radius:20px;
    padding:12px; position:relative; align-items:center; cursor:pointer;
  }
  .offer-card .img{width:88px; height:88px; border-radius:16px; overflow:hidden; flex-shrink:0; background:var(--bg-card-2);}
  .offer-card .img img{width:100%; height:100%; object-fit:cover;}
  .offer-card .img .emoji-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:38px;}
  .offer-badge{
    position:absolute; top:10px; left:10px; background:var(--danger); color:#fff; font-size:11px;
    font-weight:700; padding:4px 9px; border-radius:9px;
  }
  .offer-card .name{font-weight:700; font-size:14.5px;}
  .offer-card .desc{color:var(--dim); font-size:12px; margin:3px 0 8px;}
  .price-row{display:flex; align-items:baseline; gap:8px;}
  .price-old{color:var(--dim); font-size:12px; text-decoration:line-through;}
  .price-new{color:var(--accent); font-weight:800; font-size:14.5px;}

  /* Popular horizontal scroll */
  .h-scroll{display:flex; gap:14px; overflow-x:auto; padding-bottom:6px; margin:0 -18px; padding-inline:18px;}
  .pop-card{
    flex:0 0 150px; background:var(--bg-card); border:1px solid var(--border); border-radius:18px; overflow:hidden; cursor:pointer;
  }
  .pop-card .img{height:110px; background:var(--bg-card-2); position:relative;}
  .pop-card .img img{width:100%; height:100%; object-fit:cover;}
  .pop-card .img .emoji-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:40px;}
  .pop-card .fire{position:absolute; top:8px; right:8px; background:rgba(20,15,12,.75); color:var(--accent-2); font-size:11px; padding:3px 7px; border-radius:8px; display:flex; align-items:center; gap:3px;}
  .pop-card .info{padding:10px 11px 12px;}
  .pop-card .name{font-weight:700; font-size:13px; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .pop-card .rating{font-size:11px; color:var(--dim); display:flex; align-items:center; gap:4px;}
  .pop-card .rating i{color:var(--accent);}
  .pop-card .price{color:var(--accent); font-weight:700; font-size:12.5px; margin-top:5px;}

  /* Category accordion (menu tab) */
  .cat-block{background:var(--bg-card); border:1px solid var(--border); border-radius:18px; margin-bottom:10px; overflow:hidden;}
  .cat-head{display:flex; align-items:center; gap:12px; padding:15px 16px; cursor:pointer;}
  .cat-head .cicon{
    width:38px;height:38px;border-radius:11px; background:var(--bg-card-2); display:flex;align-items:center;justify-content:center;
    color:var(--accent); font-size:16px; flex-shrink:0;
  }
  .cat-head .cname{font-weight:700; font-size:14.5px; flex:1;}
  .cat-head .ccount{color:var(--dim); font-size:12.5px; margin-inline-end:4px;}
  .cat-head i.chev{color:var(--dim); transition:transform .25s ease;}
  .cat-block.open .cat-head i.chev{transform:rotate(180deg); color:var(--accent);}
  .cat-items{max-height:0; overflow:hidden; transition:max-height .3s ease;}
  .cat-block.open .cat-items{max-height:3000px;}
  .item-row{
    display:flex; gap:12px; align-items:center; padding:12px 16px; border-top:1px solid var(--border);
  }
  .item-row .img{width:64px; height:64px; border-radius:14px; overflow:hidden; flex-shrink:0; background:var(--bg-card-2);}
  .item-row .img img{width:100%; height:100%; object-fit:cover;}
  .item-row .img .emoji-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;}
  .item-row .info{flex:1; min-width:0;}
  .item-row .name{font-weight:700; font-size:13.5px;}
  .item-row .desc{color:var(--dim); font-size:11.5px; margin:2px 0 5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .item-row .bottom-line{display:flex; align-items:center; justify-content:space-between;}
  .item-row .price{color:var(--accent); font-weight:700; font-size:13px;}
  .item-row .rating{font-size:11px; color:var(--dim); display:flex; align-items:center; gap:3px;}
  .item-row .rating i{color:var(--accent);}
  .add-btn{
    width:32px;height:32px;border-radius:10px; background:var(--accent); color:#1a1209; border:none;
    display:flex;align-items:center;justify-content:center; font-size:14px; cursor:pointer; flex-shrink:0;
  }

  .empty-state{text-align:center; padding:50px 20px; color:var(--dim);}
  .empty-state i{font-size:34px; margin-bottom:12px; color:var(--accent-dark);}

  /* Waiter FAB (menu tab) */
  .waiter-btn{
    display:flex; align-items:center; justify-content:center; gap:9px; width:100%;
    background:linear-gradient(90deg,var(--accent),var(--accent-2)); color:#1a1209; font-weight:800; font-size:14px;
    padding:14px; border-radius:16px; border:none; margin:20px 0 6px; cursor:pointer;
    box-shadow:0 8px 22px rgba(217,164,65,.25);
  }

  /* Bottom nav */
  .bottom-nav{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px;
    background:rgba(20,15,12,.97); backdrop-filter:blur(10px); border-top:1px solid var(--border);
    display:flex; z-index:40; padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  }
  .nav-item{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 0; cursor:pointer;
    color:var(--dim); font-size:10.5px; border:none; background:none; font-family:inherit;
  }
  .nav-item i{font-size:17px;}
  .nav-item.active{color:var(--accent);}

  /* generic placeholder views */
  .placeholder-box{
    background:var(--bg-card); border:1px solid var(--border); border-radius:18px; padding:30px 20px; text-align:center; margin-top:16px;
  }
  .placeholder-box i{font-size:32px; color:var(--accent); margin-bottom:10px;}
  .placeholder-box h4{margin:0 0 6px; font-size:15px;}
  .placeholder-box p{margin:0; color:var(--dim); font-size:12.5px; line-height:1.9;}

  .toast{
    position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0;
    background:var(--bg-card-2); border:1px solid var(--accent); color:var(--text); padding:11px 20px; border-radius:14px;
    font-size:13px; z-index:60; transition:all .25s ease; pointer-events:none; white-space:nowrap;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="topbar">
    <div class="topbar-row">
      <div class="brand">
        <div class="brand-icon"><i class="fa-solid fa-mug-hot"></i></div>
        <div class="brand-title" id="cafeName">آب و آتش</div>
      </div>

    </div>
    <div class="search-wrap">
      <div class="search-box">
        <input id="searchInput" type="text" placeholder="جستجوی محصولات...">
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>
    </div>
    <div class="tabs-row">
      <div class="tab-pill active" data-tab="home" onclick="switchTab('home')" id="tabBtnHome">خانه</div>
      <div class="tab-pill" data-tab="menu" onclick="switchTab('menu')" id="tabBtnMenu">منو</div>
    </div>
  </div>

  <!-- HOME VIEW -->
  <div class="view active" id="view-home">
    <div class="hero">
      <i class="fa-solid fa-mug-saucer steam"></i>
      <h2 id="heroTitle">به کافه ما خوش آمدید</h2>
      <p id="heroSub">لذت نوشیدنی‌های خاص و لحظات خوشمزه</p>
      <button class="hero-btn" onclick="switchTab('menu')"><i class="fa-solid fa-book-open"></i> <span id="heroBtnTxt">مشاهده منو</span></button>
    </div>

    <div class="section-title">
      <h3><i class="fa-solid fa-star" style="color:var(--accent);"></i> <span id="offerTitle">پیشنهاد ویژه</span></h3>
    </div>
    <div id="offerContainer"></div>

    <div class="section-title">
      <h3><i class="fa-solid fa-fire" style="color:var(--accent);"></i> <span id="popularTitle">محبوب‌ترین‌ها</span></h3>
    </div>
    <div class="h-scroll" id="popularContainer"></div>
  </div>

  <!-- MENU VIEW -->
  <div class="view" id="view-menu">
    <div id="categoriesContainer" style="margin-top:14px;"></div>
    <button class="waiter-btn" onclick="callWaiter()"><i class="fa-solid fa-bell-concierge"></i> <span id="waiterBtnTxt">تماس با گارسون</span></button>
  </div>

  <!-- INFO VIEW -->
  <div class="view" id="view-info">
    <div class="placeholder-box" style="margin-top:20px; text-align:right;">
      <div style="text-align:center;"><i class="fa-solid fa-circle-info"></i></div>
      <h4 style="text-align:center;">درباره ما</h4>
      <p style="margin-top:10px;">
        <i class="fa-solid fa-location-dot" style="color:var(--accent); width:18px;"></i> آدرس کافه را از پنل مدیریت ویرایش کنید<br><br>
        <i class="fa-solid fa-phone" style="color:var(--accent); width:18px;"></i> شماره تماس<br><br>
        <i class="fa-solid fa-clock" style="color:var(--accent); width:18px;"></i> هر روز ۹ صبح تا ۱۲ شب
      </p>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <button class="nav-item active" data-nav="home" onclick="switchTab('home')">
      <i class="fa-solid fa-house"></i><span>خانه</span>
    </button>
    <button class="nav-item" data-nav="menu" onclick="switchTab('menu')">
      <i class="fa-solid fa-utensils"></i><span>منو</span>
    </button>
    <button class="nav-item" data-nav="info" onclick="switchTab('info')">
      <i class="fa-solid fa-circle-info"></i><span>اطلاعات</span>
    </button>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
let menuItems = [];

async function loadMenuData(){
  try{
    const res = await fetch(`menu-data.json?t=${Date.now()}`);
    menuItems = await res.json();
  }catch(err){
    console.error(err);
    menuItems = [];
  }
  renderHome();
  renderMenu();
}

function fmtPrice(p){
  const n = Number(p) || 0;
  return n.toLocaleString('en-US');
}
function seedNum(id, min, max){
  const s = Number(id) % 1000;
  return min + (s % (max - min));
}
function getRating(item){ return item.rating || 4.5; }
function getReviews(item){ return item.reviews || seedNum(item.id, 20, 140); }
function categoryIcon(cat){
  cat = cat || '';
  if(/گرم|hot/i.test(cat)) return 'fa-mug-hot';
  if(/سرد|cold|یخ/i.test(cat)) return 'fa-mug-saucer';
  if(/میوه|fruit|جوس/i.test(cat)) return 'fa-lemon';
  if(/دسر|شیرینی|کیک|dessert/i.test(cat)) return 'fa-ice-cream';
  if(/غذا|ساندویچ|پیتزا|food/i.test(cat)) return 'fa-utensils';
  if(/ویژه|پیشنهاد|special/i.test(cat)) return 'fa-star';
  return 'fa-mug-hot';
}
function imgOrEmoji(item, cls){
  if(item.image){
    return `<div class="img"><img src="${item.image}" alt="${item.name}"></div>`;
  }
  return `<div class="img"><div class="emoji-ph">${item.emoji || '☕'}</div></div>`;
}

function renderHome(){
  // Special offer: item with highest discount, else first item
  const offerItem = [...menuItems].sort((a,b) => (b.discount||0)-(a.discount||0))[0];
  const offerC = document.getElementById('offerContainer');
  if(!offerItem){
    offerC.innerHTML = `<div class="empty-state"><i class="fa-solid fa-mug-hot"></i><div>هنوز آیتمی ثبت نشده</div></div>`;
  } else {
    const disc = offerItem.discount || 0;
    const newPrice = disc > 0 ? Math.round(Number(offerItem.price) * (1 - disc/100)) : Number(offerItem.price);
    offerC.innerHTML = `
      <div class="offer-card" onclick="switchTab('menu')">
        ${disc > 0 ? `<div class="offer-badge">٪${disc} تخفیف</div>` : ''}
        ${imgOrEmoji(offerItem)}
        <div style="flex:1;">
          <div class="name">${offerItem.name}</div>
          <div class="desc">${offerItem.desc || offerItem.category}</div>
          <div class="price-row">
            ${disc > 0 ? `<span class="price-old">${fmtPrice(offerItem.price)} تومان</span>` : ''}
            <span class="price-new">${fmtPrice(newPrice)} تومان</span>
          </div>
        </div>
      </div>`;
  }

  // Popular
  let pop = menuItems.filter(i => i.popular);
  if(pop.length === 0) pop = [...menuItems].sort((a,b)=>getRating(b)-getRating(a)).slice(0,6);
  const popC = document.getElementById('popularContainer');
  if(pop.length === 0){
    popC.innerHTML = `<div class="empty-state" style="width:100%;"><i class="fa-solid fa-fire"></i><div>آیتم محبوبی نیست</div></div>`;
  } else {
    popC.innerHTML = pop.map(item => `
      <div class="pop-card" onclick="switchTab('menu')">
        <div class="img">
          ${item.image ? `<img src="${item.image}" alt="${item.name}">` : `<div class="emoji-ph">${item.emoji || '☕'}</div>`}
          <div class="fire"><i class="fa-solid fa-fire"></i> پرطرفدار</div>
        </div>
        <div class="info">
          <div class="name">${item.name}</div>
          <div class="rating"><i class="fa-solid fa-star"></i> ${getRating(item)} (${getReviews(item)})</div>
          <div class="price">${fmtPrice(item.price)} تومان</div>
        </div>
      </div>
    `).join('');
  }
}

let openCategory = null;
function renderMenu(filterTerm){
  const container = document.getElementById('categoriesContainer');
  let items = menuItems;
  if(filterTerm){
    const t = filterTerm.toLowerCase();
    items = items.filter(i => i.name.toLowerCase().includes(t) || (i.desc||'').toLowerCase().includes(t) || (i.category||'').toLowerCase().includes(t));
  }
  if(items.length === 0){
    container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-magnifying-glass"></i><div>موردی پیدا نشد</div></div>`;
    return;
  }
  const cats = [];
  items.forEach(i => { if(!cats.includes(i.category)) cats.push(i.category); });

  if(filterTerm && openCategory === null) { /* keep all open while searching */ }

  container.innerHTML = cats.map(cat => {
    const catItems = items.filter(i => i.category === cat);
    const isOpen = filterTerm ? true : (openCategory === cat);
    return `
    <div class="cat-block ${isOpen ? 'open' : ''}" data-cat="${cat}">
      <div class="cat-head" onclick="toggleCategory('${cat.replace(/'/g,"\\'")}')">
        <div class="cicon"><i class="fa-solid ${categoryIcon(cat)}"></i></div>
        <div class="cname">${cat}</div>
        <div class="ccount">(${catItems.length})</div>
        <i class="fa-solid fa-chevron-down chev"></i>
      </div>
      <div class="cat-items">
        ${catItems.map(item => `
          <div class="item-row">
            ${imgOrEmoji(item)}
            <div class="info">
              <div class="name">${item.name}</div>
              <div class="desc">${item.desc || ''}</div>
              <div class="bottom-line">
                <span class="price">${fmtPrice(item.price)} تومان</span>
                <span class="rating"><i class="fa-solid fa-star"></i> ${getRating(item)} (${getReviews(item)})</span>
              </div>
            </div>
            <button class="add-btn" onclick="event.stopPropagation(); addToast('${item.name.replace(/'/g,"\\'")}')"><i class="fa-solid fa-plus"></i></button>
          </div>
        `).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleCategory(cat){
  openCategory = (openCategory === cat) ? null : cat;
  renderMenu(document.getElementById('searchInput').value);
}

function switchTab(tab){
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${tab}`).classList.add('active');
  document.querySelectorAll('.tab-pill').forEach(b => b.classList.remove('active'));
  const pillBtn = document.querySelector(`.tab-pill[data-tab="${tab}"]`);
  if(pillBtn) pillBtn.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  const navBtn = document.querySelector(`.nav-item[data-nav="${tab}"]`);
  if(navBtn) navBtn.classList.add('active');
  const searchWrap = document.querySelector('.search-wrap');
  searchWrap.style.display = (tab === 'home' || tab === 'menu') ? 'block' : 'none';
  const tabsRow = document.querySelector('.tabs-row');
  tabsRow.style.display = (tab === 'home' || tab === 'menu') ? 'flex' : 'none';
}

function callWaiter(){
  addToast('درخواست شما برای کارمند ارسال شد 🔔');
}

let toastTimer;
function addToast(itemName){
  const t = document.getElementById('toast');
  t.textContent = itemName.includes('🔔') ? itemName : `«${itemName}» به سبد اضافه شد`;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  const term = e.target.value;
  if(term){
    switchTab('menu');
    document.querySelector('.tab-pill[data-tab="menu"]').click;
  }
  renderMenu(term);
});

loadMenuData();
</script>
</body>
</html>
