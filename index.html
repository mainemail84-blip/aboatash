<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina Café • Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Vazirmatn', system-ui, sans-serif;
    }
    
    .menu-card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      transform: translateY(20px);
    }
    
    .menu-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
    
    .menu-card:hover {
      transform: translateY(-12px) scale(1.03);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.2);
    }

    .category-chip {
      transition: all 0.3s ease;
    }
    
    .fade-in {
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-md mx-auto bg-zinc-900 min-h-screen">

    <!-- Header -->
    <div class="sticky top-0 bg-zinc-900 border-b border-zinc-700 z-10">
      <div class="p-6 flex items-center gap-3">
        <i class="fa-solid fa-mug-hot text-4xl text-amber-500 animate-bounce"></i>
        <h1 class="text-3xl font-bold">لومینا کافه</h1>
      </div>

      <div class="px-6 pb-6">
        <div class="relative">
          <input id="searchInput" type="text" placeholder="جستجو در منو..." 
                 class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl py-4 px-6 pl-12 focus:outline-none focus:border-amber-500 text-base transition-all">
          <i class="fa-solid fa-magnifying-glass absolute left-6 top-4.5 text-zinc-400"></i>
        </div>
      </div>

      <!-- Categories -->
      <div class="px-6 pb-4 flex gap-2 overflow-x-auto scrollbar-hide">
        <button onclick="filterCategory('all')" class="category-chip active px-7 py-2.5 bg-amber-500 text-black rounded-3xl text-sm font-medium whitespace-nowrap">همه</button>
        <button onclick="filterCategory('coffee')" class="category-chip px-7 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-3xl text-sm font-medium whitespace-nowrap">قهوه</button>
        <button onclick="filterCategory('tea')" class="category-chip px-7 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-3xl text-sm font-medium whitespace-nowrap">چای</button>
        <button onclick="filterCategory('pastry')" class="category-chip px-7 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-3xl text-sm font-medium whitespace-nowrap">شیرینی</button>
        <button onclick="filterCategory('breakfast')" class="category-chip px-7 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-3xl text-sm font-medium whitespace-nowrap">صبحانه</button>
      </div>
    </div>

    <!-- Menu -->
    <div id="menuContainer" class="p-6 grid grid-cols-2 gap-5"></div>
  </div>

  <script>
    let menuItems = [];

    async function loadMenuData() {
      try {
        const timestamp = new Date().getTime();
        const res = await fetch(`menu-data.json?t=${timestamp}`);
        menuItems = await res.json();
        renderMenu(menuItems);
      } catch (err) {
        console.error(err);
      }
    }

    function renderMenu(items) {
      const container = document.getElementById('menuContainer');
      container.innerHTML = '';

      items.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = `menu-card bg-zinc-800 rounded-3xl overflow-hidden`;
        card.style.animationDelay = `${index * 80}ms`;
        card.innerHTML = `
          <div class="h-44 bg-zinc-700 flex items-center justify-center text-8xl transition-transform hover:scale-110">
            ${item.emoji}
          </div>
          <div class="p-4 text-center">
            <h3 class="font-bold text-lg">${item.name}</h3>
            <p class="text-zinc-400 text-sm mt-1">${item.desc || ''}</p>
            <p class="text-amber-400 font-bold mt-3">${item.price} هزار تومان</p>
          </div>
        `;
        container.appendChild(card);

        // Trigger animation
        setTimeout(() => card.classList.add('visible'), 50);
      });
    }

    function filterCategory(cat) {
      document.querySelectorAll('.category-chip').forEach(btn => btn.classList.remove('active', 'bg-amber-500', 'text-black'));
      
      if (cat === 'all') {
        document.querySelectorAll('.category-chip')[0].classList.add('active', 'bg-amber-500', 'text-black');
        renderMenu(menuItems);
      } else {
        const filtered = menuItems.filter(item => item.category === cat);
        renderMenu(filtered);
      }
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = menuItems.filter(item => 
        item.name.toLowerCase().includes(term) || 
        (item.desc && item.desc.toLowerCase().includes(term))
      );
      renderMenu(filtered);
    });

    // بارگذاری
    loadMenuData();
  </script>
</body>
</html>
